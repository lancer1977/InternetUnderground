# R620-ready Traefik stack for the IU-HD static site.
# Copy this file into the live R620 runtime tree and provide a .env there.

services:
  web:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    environment:
      NGINX_ENTRYPOINT_QUIET_LOGS: "1"
    volumes:
      - type: bind
        source: ${IU_HD_SITE_ROOT:-/home/lancer1977/servers/internetunderground}
        target: /srv/site
        read_only: true
      - type: bind
        source: ./default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 3m
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        monitor: 120s
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.${IU_HD_APP_NAME:-iu-hd}.rule=Host(`${IU_HD_HOST:-iu-hd.polyhydragames.com}`)"
        - "traefik.http.routers.${IU_HD_APP_NAME:-iu-hd}.entrypoints=websecure"
        - "traefik.http.routers.${IU_HD_APP_NAME:-iu-hd}.tls=true"
        - "traefik.http.services.${IU_HD_APP_NAME:-iu-hd}.loadbalancer.server.port=80"
        - "traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-traefik-public}"
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
    name: ${TRAEFIK_PUBLIC_NETWORK:-traefik-public}
