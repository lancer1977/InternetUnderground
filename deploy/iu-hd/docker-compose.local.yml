services:
  web:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: ${IU_HD_CONTAINER_NAME:-iu-hd-web}
    restart: unless-stopped
    ports:
      - "${IU_HD_LOCAL_PORT:-8088}:80"
    volumes:
      - type: bind
        source: ${IU_HD_SITE_ROOT:-../..}
        target: /srv/site
        read_only: true
      - type: bind
        source: ./default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
