name: Deploy archive to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate publishing artifacts
        run: python3 scripts/generate-spottie-news.py

      - name: Validate modern reader
        run: python3 scripts/validate-modern-reader.py

      - name: Stage pages bundle
        run: |
          set -euo pipefail
          rm -rf .pages-site
          mkdir -p .pages-site
          cp index.html u-o.gif .nojekyll CNAME .pages-site/
          cp -R iu .pages-site/
          cp -R reader content spottie-news .pages-site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
