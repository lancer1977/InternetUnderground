name: Deploy archive to GitHub Pages

on:
  push:
    branches:
      - haid-v1
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage pages bundle
        run: |
          set -euo pipefail
          rm -rf .pages-site
          mkdir -p .pages-site
          cp index.html u-o.gif CNAME .nojekyll .pages-site/
          cp -R iu .pages-site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
